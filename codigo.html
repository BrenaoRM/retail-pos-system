<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fechamento Analítico - Big Pizza & Burguer</title>
    <style>
    :root { 
        --salao: #2980b9; 
        --delivery: #d35400; 
        --success: #27ae60;
        --danger: #c0392b;
        /* Película escura sutil sobre o fundo para dar contraste */
        --bg-overlay: rgba(0, 0, 0, 0.7); 
        /* Cor de fundo dos cards (branca bem transparente) */
        --card-bg: rgba(0, 0, 0, 0.4);
        /* Cor do texto (branca para contrastar com o fundo escuro) */
        --text-color: #fff;
    }

    body { 
        font-family: 'Segoe UI', sans-serif; 
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: var(--text-color);
        
        /* CONFIGURAÇÃO DO FUNDO */
        /* 1. Cor sólida de segurança (caso a imagem não carregue) */
        background-color: #2c3e50; 
        /* 2. Película + Imagem (Ajuste o caminho se necessário) */
        background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('img/background.jpg'); 
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
    }

    .container { 
        max-width: 1000px; 
        margin: auto; 
        width: 100%;
        display: flex;
        flex-direction: column;
        transition: all 0.5s ease;
        
        /* FUNDO ESCURO COM BLUR */
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1); /* Borda bem fina e escura */
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

    /* Ajuste para centralizar o menu de setup */
    .centering-setup {
        margin-top: 15vh;
        align-items: center;
        /* Remove o fundo do container pai quando estiver centralizado para não duplicar o blur */
        background: transparent;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: none;
        box-shadow: none;
    }

    .card { 
        padding: 25px; 
        border-radius: 15px; 
        background: rgba(0, 0, 0, 0.5); /* Garante que o fundo seja preto translúcido */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        width: 100%;
        box-sizing: border-box;
}
    /* Mantém o fundo do setup visível quando centralizado */
    #setup.card {
        background: rgba(0, 0, 0, 0.5);
        max-width: 500px;
        border: 2px dashed rgba(255, 255, 255, 0.3);
        text-align: center;
    }

    .grid-setores { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 25px; 
        margin-top: 20px; 
    }

    /* Cores das bordas superiores dos cards */
    .card-salao { border-top: 6px solid var(--salao); }
    .card-delivery { border-top: 6px solid var(--delivery); }

    h2 { text-align: center; color: var(--text-color); margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    h3 { margin-top: 0; display: flex; justify-content: space-between; color: var(--text-color); }
    h4 { color: var(--text-color); }

    .input-group { margin-bottom: 12px; }
    label { font-size: 13px; font-weight: bold; color: #ddd; display: block; margin-bottom: 5px; }
    
    /* Estilo dos Inputs para combinar com o tema escuro */
    input { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid rgba(255, 255, 255, 0.3); 
        border-radius: 8px; 
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.3);
        color: var(--text-color);
    }
    input:focus {
        outline: none;
        border-color: var(--salao);
        background: rgba(0, 0, 0, 0.5);
    }

    .btn { 
        cursor: pointer; 
        border: none; 
        border-radius: 8px; 
        font-weight: bold; 
        transition: 0.3s; 
    }

    .btn-setup { 
        background: #34495e; 
        color: white; 
        padding: 12px 25px; 
        margin-top: 15px; 
    }

    .btn-setup:hover { 
        background: rgba(52, 73, 94, 0.7); 
    }

    .btn-final { 
        background: var(--success); 
        color: white; 
        padding: 20px; 
        width: 100%; 
        font-size: 18px; 
        margin-top: 30px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .btn-final:hover { background: #219150; opacity: 0.9; }

    #resultado { 
        margin-top: 30px; 
        display: none; 
        padding: 25px; 
        border-radius: 15px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Cores do resultado com fundo translúcido */
    .dif-positiva { 
        border-left: 10px solid var(--success); 
        background: rgba(0, 83, 6, 0.4); /* Verde escuro translúcido */
        color: #e8f5e9;
    }
    .dif-negativa { 
        border-left: 10px solid var(--danger); 
        background: rgba(183, 28, 28, 0.4); /* Vermelho escuro translúcido */
        color: #ffebee;
    }
    
    .badge-entrega { color: var(--delivery); font-size: 15px; font-weight: bold; }
    
    /* Ajuste de cor para textos dentro dos acertos dos motoboys */
    #listaEntregadoresDinamica label { color: #eee; }
    #listaEntregadoresDinamica div { color: var(--text-color); }
    hr { border: 0; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 20px 0; }
    
    /* --- CLASSES UTILITÁRIAS (REFATORAÇÃO) --- */
    .flex-col-center { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .input-qtd-setup { text-align: center; max-width: 150px; }
    .input-nome { margin-bottom: 8px; }
    .btn-confirm { background: #e67e22; }
    .btn-confirm:hover { background: #d35400; }
    
    .card-motoboy { background: rgba(0, 0, 0, 0.4); padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.5); }
    .grid-motoboy-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
    .lbl-micro { font-size: 10px; }
    
    .card-resultado { background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 10px; }
    .tit-salao { color: var(--salao); margin-top: 0; }
    .tit-delivery { color: var(--delivery); margin-top: 0; }
    
    .lista-motoboys { padding-left: 0; }
    .item-motoboy { margin-bottom: 8px; list-style: none; padding: 8px; border-bottom: 1px dashed #bbb; }
    
    .res-final { text-align: center; }
    .res-final h2 { margin: 10px 0; }
    .titulo-relatorio { text-align: center; }
</style>
</head>
<body>

<div class="container centering-setup" id="mainContainer">
    <h2>📊 Fechamento de Caixa Analítico</h2>

    <div id="setup" class="card">
        <label>Quantos entregadores trabalharam hoje?</label>
        <div class="flex-col-center">
            <input type="number" id="qtdEntregadores" placeholder="Ex: 3" class="input-qtd-setup">
            <button class="btn btn-setup" onclick="configurarEntregadores()">Definir Equipe</button>
        </div>
        <div id="nomesArea"></div>
    </div>

    <div id="formularioPrincipal" style="display:none; width: 100%;">
        <div class="grid-setores">
            <div class="card card-salao">
                <h3>🍽️ SALÃO</h3>
                <div class="input-group">
                    <label>Vendas Totais no Web Cardápio (Mesas):</label>
                    <input type="number" id="vendaSistSalao" step="0.01">
                </div>
                <hr>
                <div class="input-group">
                    <label>Caixa Inicial (Troco):</label>
                    <input type="number" id="caixaInicial" step="0.01">
                </div>
                <div class="input-group">
                    <label>Maquininha Salão:</label>
                    <input type="number" id="maqSalao" step="0.01">
                </div>
                <div class="input-group">
                    <label>Dinheiro Físico Total (Gaveta):</label>
                    <input type="number" id="dinSalao" step="0.01">
                </div>
                <div class="input-group">
                    <label>🍔 Excedente de Lanches (Funcionários):</label>
                    <input type="number" id="excedenteLanche" step="0.01" placeholder="0.00">
                </div>
            </div>

            <div class="card card-delivery">
                <h3>🛵 DELIVERY / RETIRADA</h3>
                <div class="input-group">
                    <label>Web Cardápio (Delivery/Retirada):</label>
                    <input type="number" id="vendaWebDeliv" step="0.01">
                </div>
                <div class="input-group">
                    <label>App Bundi (Delivery):</label>
                    <input type="number" id="vendaBundiDeliv" step="0.01">
                </div>
                <hr>
                <div class="input-group">
                    <label>Maquininha Retirada (Balcão):</label>
                    <input type="number" id="maqRetirada" step="0.01">
                </div>
                <div id="listaEntregadoresDinamica"></div>
            </div>
        </div>

        <button class="btn btn-final" onclick="gerarRelatorio()">CALCULAR FECHAMENTO</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    let entregadores = [];
    
    // Função utilitária para pegar valores numéricos de forma segura
    const getValor = (id) => Number(document.getElementById(id).value) || 0;

    function configurarEntregadores() {
        const qtd = getValor('qtdEntregadores');
        if(!qtd || qtd <= 0) return alert("Insira a quantidade de entregadores.");
        
        const area = document.getElementById('nomesArea');
        let html = '<br><label>Nomes dos Entregadores:</label>';
        
        for(let i=0; i<qtd; i++) {
            html += `<input type="text" class="nome-ent input-nome" placeholder="Nome ${i+1}">`;
        }
        html += `<br><button class="btn btn-setup btn-confirm" onclick="confirmarNomes()">Confirmar e Abrir Caixa</button>`;
        
        area.innerHTML = html;
    }

    function confirmarNomes() {
        const inputs = document.querySelectorAll('.nome-ent');
        entregadores = Array.from(inputs).map(i => i.value.trim() || "Entregador");
        
        const areaDinamica = document.getElementById('listaEntregadoresDinamica');
        let html = '<h4>Acerto dos Motoboys:</h4>';
        
        entregadores.forEach((nome, index) => {
            html += `
                <div class="card-motoboy">
                    <span class="badge-entrega">🙋 ${nome}</span>
                    <div class="grid-motoboy-inputs">
                        <div><label class="lbl-micro">🛵 Entregas</label><input type="number" class="e-qtd" placeholder="0"></div>
                        <div><label class="lbl-micro">💳 Maquininha</label><input type="number" class="e-maq" placeholder="0.00"></div>
                        <div><label class="lbl-micro">💵 Dinheiro</label><input type="number" class="e-din" placeholder="0.00"></div>
                        <div><label class="lbl-micro">⛽ Gasolina</label><input type="number" class="e-gas" placeholder="0.00"></div>
                    </div>
                </div>`;
        });
        
        areaDinamica.innerHTML = html;
        
        document.getElementById('mainContainer').classList.remove('centering-setup');
        document.getElementById('formularioPrincipal').style.display = 'block';
        document.getElementById('setup').style.display = 'none';
    }

    function gerarRelatorio() {
        // --- CÁLCULO SALÃO ---
        const sistSalao = getValor('vendaSistSalao');
        const excedente = getValor('excedenteLanche');
        const inicial = getValor('caixaInicial');
        
        const realSalao = (getValor('dinSalao') - inicial) + getValor('maqSalao');
        const difSalao = (realSalao - excedente) - sistSalao;

        // --- CÁLCULO DELIVERY ---
        const sistDeliv = getValor('vendaWebDeliv') + getValor('vendaBundiDeliv');
        const maqRetirada = getValor('maqRetirada');
        
        let totalMaqEnt = 0, totalDinEnt = 0, totalEntregas = 0, totalGasEnt = 0;
        let htmlEntregadores = "";

        const inputsQtd = document.querySelectorAll('.e-qtd');
        const inputsMaq = document.querySelectorAll('.e-maq');
        const inputsDin = document.querySelectorAll('.e-din');
        const inputsGas = document.querySelectorAll('.e-gas');

        entregadores.forEach((nome, i) => {
            const qtd = Number(inputsQtd[i].value) || 0;
            const vMaq = Number(inputsMaq[i].value) || 0;
            const vDin = Number(inputsDin[i].value) || 0;
            const vGas = Number(inputsGas[i].value) || 0;
            const totalInd = vMaq + vDin + vGas;
            
            totalEntregas += qtd;
            totalMaqEnt += vMaq;
            totalDinEnt += vDin;
            totalGasEnt += vGas;
            
            htmlEntregadores += `
                <li class="item-motoboy">
                    <strong>🙋${nome}</strong> <br> 🛵 ${qtd} entregas <br>
                    <span>💳 Maquininha: R$ ${vMaq.toFixed(2)}</span> | <span>💵 Dinheiro: R$ ${vDin.toFixed(2)}</span> | <span>⛽ Gasolina: R$ ${vGas.toFixed(2)}</span><br>
                    <span>💰 <strong>Total: R$ ${totalInd.toFixed(2)}</strong></span>
                </li>`;
        });

        const realDeliv = maqRetirada + totalMaqEnt + totalDinEnt + totalGasEnt;
        const difDeliv = realDeliv - sistDeliv;

        // --- EXIBIÇÃO ---
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block';
        resDiv.className = (Math.abs(difSalao + difDeliv) < 1) ? 'dif-positiva' : 'dif-negativa';

        resDiv.innerHTML = `
            <h3 style="text-align: center;">📋 RESULTADO DO FECHAMENTO</h3>
            <div class="grid-setores">
                <div style="background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 10px;">
                    <h4 style="color:var(--salao); margin-top:0;">🍽️ SALÃO</h4>
                    <p>Vendas (Esperado): R$ ${sistSalao.toFixed(2)}</p>
                    <p>Real (Recebido): R$ ${realSalao.toFixed(2)}</p>
                    <p>🍔 Excedente: - R$ ${excedente.toFixed(2)}</p>
                    <hr>
                    <p><strong>Diferença: R$ ${difSalao.toFixed(2)}</strong></p>
                </div>
                <div style="background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 10px;">
                    <h4 style="color:var(--delivery); margin-top:0;">🛵 DELIVERY</h4>
                    <p>Vendas (Esperado): R$ ${sistDeliv.toFixed(2)}</p>
                    <p>Real (Recebido): R$ ${(maqRetirada + totalMaqEnt + totalDinEnt).toFixed(2)}</p>
                    <p>⛽ Gasto Combustível: + R$ ${totalGasEnt.toFixed(2)}</p>
                    <hr>
                    <p><strong>Diferença: R$ ${difDeliv.toFixed(2)}</strong></p>
                </div>
            </div>
            <hr>
            <h4>📦 Acertos Motoboys (${totalEntregas} total):</h4>
            <ul style="padding-left: 0;">${htmlEntregadores}</ul>
            <hr>
            <div style="text-align: center;">
                <h2 style="margin:10px 0">💵 Diferença Total: R$ ${(difSalao + difDeliv).toFixed(2)}</h2>
                <p>${Math.abs(difSalao + difDeliv) < 1 ? "✅ Caixa Fechado!" : "⚠️ Verifique as divergências."}</p>
            </div>
        `;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
